# 复制为 /etc/nginx/sites-available/ai-recruit（或 include 进主配置）后修改域名与证书路径。
# 假设证书文件（按你实际 down 下来的文件名改）：
#   私钥：/etc/nginx/ssl/your-domain.key   （或 .pem 若厂商给的是单文件私钥，少见）
#   证书链：/etc/nginx/ssl/your-domain.pem （或 fullchain.pem）
#
# 前置：域名 DNS 已添加 A 记录指向本机公网 IP，且服务器 80/443 已放行。

# 小程序 API（HTTPS）→ 本机 Docker 或进程的 3001
server {
    listen 443 ssl http2;
    server_name api.你的域名.com;

    ssl_certificate     /etc/nginx/ssl/your-domain.pem;
    ssl_certificate_key /etc/nginx/ssl/your-domain.key;

    # 可选：Mozilla 中间配置 https://ssl-config.mozilla.org/
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    # 与 server/index.ts 上传限制大致一致（可按需调大）
    client_max_body_size 8m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 管理后台（HTTPS）→ 本机 3000
server {
    listen 443 ssl http2;
    server_name admin.你的域名.com;

    ssl_certificate     /etc/nginx/ssl/your-domain.pem;
    ssl_certificate_key /etc/nginx/ssl/your-domain.key;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP 跳转 HTTPS（证书申请/续期若用 HTTP-01，需保留 80 的 location，此处略）
server {
    listen 80;
    server_name api.你的域名.com admin.你的域名.com;
    return 301 https://$host$request_uri;
}
