# AI-Recruit：小程序 API（3001）+ 管理后台（3000）
#
# 若构建拉取 node 镜像失败（metadata / content size of zero），可先：
#   export NODE_IMAGE=docker.m.daocloud.io/library/node:22-bookworm-slim
# 或配置 Docker Hub 镜像加速后再 build。
#
# 首次构建（PUBLIC_API_BASE 填浏览器可访问的 API 根 URL，含协议与端口）：
#   export PUBLIC_API_BASE=https://api.example.com
# 可选：export VITE_ADMIN_API_TOKEN_BUILD=与 ADMIN_API_TOKEN 相同（不配则管理端用登录页换 token）
#   docker compose build
#
# 服务器上放置 .env（从 .env.example 复制并填写 MYSQL_*、WECHAT_*、ADMIN_API_TOKEN 等），然后：
#   docker compose up -d
#
# 简历原件（预览/下载）：api 已挂载命名卷到容器内 /app/storage/resumes（与代码默认一致）。
#   改用宿主机目录持久化：把 api.volumes 改为例如
#     - /srv/ai-recruit/resume-files:/app/storage/resumes
#   并在 .env 中可设 RESUME_STORAGE_DIR=/app/storage/resumes（与挂载右侧路径一致）。
#   管理端「预览/下载」由浏览器请求公网 API（PUBLIC_API_BASE / 构建期 VITE_API_BASE），须能访问到 3011。
#
# MySQL 在宿主机或其它机器时：MYSQL_HOST 填可解析地址（Linux 常用宿主机内网 IP 或 Docker 网关）。

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  args:
    NODE_IMAGE: ${NODE_IMAGE:-node:22-bookworm-slim}
    VITE_API_BASE: ${PUBLIC_API_BASE:-http://47.102.85.156:3011}
    VITE_ADMIN_API_TOKEN: ${VITE_ADMIN_API_TOKEN_BUILD:-}

services:
  api:
    image: ai-recruit-app
    build: *app-build
    command: ["npx", "tsx", "server/index.ts"]
    ports:
      - "${API_PORT:-3011}:3011"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3011"
      HOST: "0.0.0.0"
    volumes:
      # 简历原件：持久化命名卷；重建/升级容器不丢文件（否则预览/下载 404）
      - resume_screening_files:/app/storage/resumes
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3011/api/health',r=>{r.resume();process.exit(0);}).on('error',()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  admin:
    image: ai-recruit-app
    build: *app-build
    command: ["npx", "tsx", "server.ts"]
    ports:
      - "${ADMIN_PORT:-3010}:3010"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      ADMIN_UI_PORT: "3010"
      # 浏览器访问的小程序 API 公网根地址（无尾斜杠），覆盖错误构建里的 localhost:3011
      MINIAPP_API_PUBLIC_URL: ${MINIAPP_API_PUBLIC_URL:-}
    restart: unless-stopped

volumes:
  resume_screening_files:
